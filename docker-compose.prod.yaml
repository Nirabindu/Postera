services:
  web:
    build:
      context: .    # tell docker where to see in project folder here root , then copy will copy from that root
      dockerfile: Dockerfile
    image: web:fastapi  # given name to the image
    container_name: fastapi_web_app
    restart: unless-stopped
    #we used copy only in prod no volumes mount needed.
    # volumes:
    #   - ./src:/app/src
    #   - ./migrations:/app/migrations
    env_file:
      - .env
    ports:
      - "8000:8000"
    networks:
      - postera_networks

  postera_db:
    image: postgres:17.9-alpine3.23
    restart: always
    env_file:
      - .env.prod
    volumes:
      - postera_data:/var/lib/postgresql/data


# create by docker if not there
volumes:
  postera_data:

#attaching service to that networks
networks:
  postera_networks:
    driver: bridge